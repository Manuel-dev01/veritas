syntax = "proto3";
package types;
option go_package = "github.com/canopy-network/go-plugin/contract";

import "google/protobuf/any.proto";
// Transaction represents a request or action submitted to the network like transfer assets or perform other operations
// within the blockchain system - THIS MUST MATCH lib.Transaction EXACTLY for signing
message Transaction {
  // message_type: The type of the transaction like 'send' or 'stake'
  string message_type = 1; // @gotags: json:"messageType"
  // msg: The actual transaction message payload, which is encapsulated in a generic message format
  google.protobuf.Any msg = 2;
  // signature: The cryptographic signature used to verify the authenticity of the transaction
  Signature signature = 3;
  // created_height: The height when the transaction was created - allows 'safe pruning'
  uint64 created_height = 4; // @gotags: json:"createdHeight"
  // time: The timestamp when the transaction was created - used as temporal entropy to prevent hash collisions in txs
  uint64 time = 5;
  // fee: The fee associated with processing the transaction
  uint64 fee = 6;
  // memo: An optional message or note attached to the transaction
  string memo = 7;
  // network_id: The identity of the network the transaction is intended for
  uint64 network_id = 8; // @gotags: json:"networkID"
  // chain_id: The identity of the committee the transaction is intended for
  uint64 chain_id = 9; // @gotags: json:"chainID"
  // NOTE: CAN EXTEND FUNCTIONALITY BY ADDING ADDITIONAL FIELDS
  // NO CONFLICT STARTING AT FIELD = 10
}

// MessageSend is a standard transfer transaction, taking tokens from the sender and transferring
// them to the recipient
message MessageSend {
  // from_address: is the sender of the funds
  bytes from_address = 1; // @gotags: json:"fromAddress"
  // to_address: is the recipient of the funds
  bytes to_address = 2; // @gotags: json:"toAddress"
  // amount: is the amount of tokens in micro-denomination (uCNPY)
  uint64 amount = 3;
}

// ===================== Veritas custom types =====================

// RatingValue is a rater's verdict on a note (mapped to fixed-point {1000,500,0} during scoring).
enum RatingValue {
  RATING_UNSPECIFIED = 0;
  RATING_HELPFUL = 1;
  RATING_SOMEWHAT = 2;
  RATING_NOT_HELPFUL = 3;
}

// NoteStatus is a note's on-chain status, recomputed each block by the bridging scorer.
enum NoteStatus {
  NOTE_STATUS_UNSPECIFIED = 0;
  NEEDS_MORE_RATINGS = 1;
  HELPFUL = 2;
  NOT_HELPFUL = 3;
}

// --- transaction messages (the contest's custom transaction types) ---

// MessageSubmitClaim registers a claim (a post/URL/statement that may need context).
message MessageSubmitClaim {
  // submitter: the address registering the claim (the authorized signer)
  bytes submitter = 1;
  // content_hash: hash of the claim text/target (non-empty unless url is set)
  bytes content_hash = 2; // @gotags: json:"contentHash"
  // url: optional URL the claim refers to
  string url = 3;
  // text: short human-readable claim text
  string text = 4;
  // nonce: caller-chosen value for deterministic id derivation + replay distinction
  uint64 nonce = 5;
}

// MessageSubmitNote attaches a note to an existing claim.
message MessageSubmitNote {
  // author: the address writing the note (the authorized signer)
  bytes author = 1;
  // claim_id: the claim this note is attached to
  bytes claim_id = 2; // @gotags: json:"claimId"
  // body: the note text
  string body = 3;
  // content_hash: optional hash of supporting material
  bytes content_hash = 4; // @gotags: json:"contentHash"
  // nonce: caller-chosen value for deterministic id derivation
  uint64 nonce = 5;
  // url: optional source URL backing the note (additive; mirrors MessageSubmitClaim.url)
  string url = 6;
}

// MessageRateNote rates a note (one rating per note+rater; later ratings overwrite).
message MessageRateNote {
  // rater: the address rating the note (the authorized signer)
  bytes rater = 1;
  // note_id: the note being rated
  bytes note_id = 2; // @gotags: json:"noteId"
  // value: the rater's verdict
  RatingValue value = 3;
  // nonce: caller-chosen value
  uint64 nonce = 4;
}

// --- state records (persisted under plugin-owned key prefixes 24-29) ---

// Claim is the persisted claim record (key prefix 24).
message Claim {
  bytes id = 1;
  bytes content_hash = 2; // @gotags: json:"contentHash"
  string url = 3;
  string text = 4;
  bytes submitter = 5;
  uint64 created_height = 6; // @gotags: json:"createdHeight"
}

// Note is the persisted note record (key prefix 25).
message Note {
  bytes id = 1;
  bytes claim_id = 2; // @gotags: json:"claimId"
  bytes author = 3;
  string body = 4;
  bytes content_hash = 5; // @gotags: json:"contentHash"
  uint64 created_height = 6; // @gotags: json:"createdHeight"
  NoteStatus status = 7;
  string url = 8;
}

// Rating is a persisted rating record (key prefix 26).
message Rating {
  bytes note_id = 1; // @gotags: json:"noteId"
  bytes rater = 2;
  RatingValue value = 3;
  uint64 created_height = 4; // @gotags: json:"createdHeight"
}

// Reputation is non-transferable rater/author reputation (key prefix 27), fixed-point x1000.
message Reputation {
  bytes account = 1;
  int64 score_fp = 2; // @gotags: json:"scoreFP"
  uint64 last_active_height = 3; // @gotags: json:"lastActiveHeight"
}

// --- events (authoritative RPC read path via /v1/query/events-by-*) ---

// ClaimCreatedEvent is emitted by DeliverTx when a claim is registered.
message ClaimCreatedEvent {
  bytes claim_id = 1; // @gotags: json:"claimId"
  bytes submitter = 2;
  bytes content_hash = 3; // @gotags: json:"contentHash"
  string url = 4;
  uint64 created_height = 5; // @gotags: json:"createdHeight"
  string text = 6;
}

// NoteCreatedEvent is emitted by DeliverTx when a note is attached to a claim.
message NoteCreatedEvent {
  bytes note_id = 1; // @gotags: json:"noteId"
  bytes claim_id = 2; // @gotags: json:"claimId"
  bytes author = 3;
  string body = 4;
  bytes content_hash = 5; // @gotags: json:"contentHash"
  uint64 created_height = 6; // @gotags: json:"createdHeight"
  NoteStatus status = 7; // initial status (NEEDS_MORE_RATINGS)
  string url = 8;
}

// NoteRatedEvent is emitted by DeliverTx when a rating lands (new or overwrite).
message NoteRatedEvent {
  bytes note_id = 1; // @gotags: json:"noteId"
  bytes rater = 2;
  RatingValue value = 3;
  uint64 created_height = 4; // @gotags: json:"createdHeight"
}

// NoteScoredEvent is emitted by EndBlock every time a note is rescored by the bridging algorithm.
// It carries the full breakdown (cohort means/counts + bridge score) so the status (changed or not)
// and the reason for it are observable over RPC and visualizable in the UI.
message NoteScoredEvent {
  bytes note_id = 1; // @gotags: json:"noteId"
  bytes claim_id = 2; // @gotags: json:"claimId"
  NoteStatus status = 3;
  int64 bridge_score = 4; // @gotags: json:"bridgeScore"
  int64 mean_a = 5; // @gotags: json:"meanA"
  int64 mean_b = 6; // @gotags: json:"meanB"
  uint32 count_a = 7; // @gotags: json:"countA"
  uint32 count_b = 8; // @gotags: json:"countB"
  uint64 height = 9;
  // matrix-factorization breakdown (the production scorer): a note is HELPFUL when note_intercept
  // clears threshold; note_factor is its position on the latent polarity axis.
  int64 note_intercept = 10; // @gotags: json:"noteIntercept"
  int64 note_factor = 11; // @gotags: json:"noteFactor"
  int64 global_mu = 12; // @gotags: json:"globalMu"
  uint32 num_raters = 13; // @gotags: json:"numRaters"
}

// ReputationChangedEvent is emitted by EndBlock when an account's non-transferable reputation moves,
// either from a note resolution (gain/loss) or from inactivity decay. score_fp is the new total.
message ReputationChangedEvent {
  bytes account = 1;
  int64 score_fp = 2; // @gotags: json:"scoreFP"
  int64 delta = 3;
  string reason = 4; // author_helpful | rater_correct | rater_wrong | author_not_helpful | decay
  uint64 height = 5;
}

// FeeParams is the parameter space that defines various amounts for transaction fees
message FeeParams {
  // send_fee: is the fee amount (in uCNPY) for Message Send
  uint64 send_fee = 1; // @gotags: json:"sendFee"
  // NO CONFLICT STARTING AT FIELD = 14
}

// A Signature is a digital signature is a cryptographic "fingerprint" created with a private key,
// allowing others to verify the authenticity and integrity of a message using the corresponding public key
message Signature {
  // public_key: is a cryptographic code shared openly, used to verify digital signatures
  bytes public_key = 1; // @gotags: json:"publicKey"
  // signature: the bytes of the signature output from a private key which may be verified with the message and public
  bytes signature = 2;
}
